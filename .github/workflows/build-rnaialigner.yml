name: Build RNAiAligner

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        env:
          GOEXPERIMENT: greenteagc
        run: go test -vet=off ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        goos:
          - windows
          - darwin
          - linux
          - freebsd
        goarch:
          - amd64
          - arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOEXPERIMENT: greenteagc
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p "dist/rnaialigner_${GOOS}_${GOARCH}"
          suffix=""
          if [ "${GOOS}" = "windows" ]; then suffix=".exe"; fi
          go build -trimpath -tags netgo -ldflags="-s -w" -o "dist/rnaialigner_${GOOS}_${GOARCH}/rnaialigner${suffix}" ./seqkit
          tar -C "dist/rnaialigner_${GOOS}_${GOARCH}" -czf "dist/rnaialigner_${GOOS}_${GOARCH}.tar.gz" "rnaialigner${suffix}"
          shasum -a 256 "dist/rnaialigner_${GOOS}_${GOARCH}.tar.gz" > "dist/rnaialigner_${GOOS}_${GOARCH}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnaialigner_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/rnaialigner_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            dist/rnaialigner_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
